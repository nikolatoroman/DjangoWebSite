{% load static %}
<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Porudžbina uspešna</title>
    <link rel="stylesheet" href="{% static 'css/order_success.css' %}">
    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
</head>
<body>

{% include 'components/header.html' %}

<<main class="success-container">

    <div class="success-icon">
        ✅

    <h1>Porudžbina uspešno kreirana!</h1>

    <p>Vaša porudžbina je evidentirana u sistemu.</p>

    <h2 class="order-number">
        {{ order.order_number }}

    <p>Status plaćanja: {{ order.payment_status }}</p>

    <a href="{% url 'home' %}" class="home-btn">
        Nazad na početnu
    </a>

</main>

{% include 'components/footer.html' %}

</body>
</html>
