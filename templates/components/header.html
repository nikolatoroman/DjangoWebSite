{% load static %}
<header class="header">
   <div class="logo">
    <a href="#">
    <img src="{% static 'images/logo.jpeg' %}" alt="logo">
    </a>
</div>

    <nav class="navbar">
        <ul>
            <li><a href="{% url 'home' %}">Početna</a></li>
            <li><a href="{% url 'games' %}">Igre</a></li>
            <li><a href="{% url 'psplus' %}">PlayStation Plus</a></li>
            <li><a href="{% url 'contact' %}">Kontakt</a></li>
        </ul>
    </nav>

    <div class="header-icons">
      {% if user.is_authenticated %}

    <a class="my-orders-link" href="{% url 'my_orders' %}">
        Moje porudžbine
    </a>

    <p class="welcome-user">
    👤 {{ user.username }}
    </p>

    <a class="auth-btn logout-btn" href="{% url 'logout' %}">
        Logout
    </a>
     {% else %}
        <a class="auth-btn login-btn" href="{% url 'login' %}">Login</a>
        <a class="auth-btn register-btn" href="{% url 'register' %}">Register</a>
     {% endif %}
    <a href="{% url 'cart' %}" class="cart-icon">
         🛒
     {% if cart_count > 0 %}
        <span class="cart-badge">{{ cart_count }}</span>
    {% endif %}
    </a>
    </div>
</header>
